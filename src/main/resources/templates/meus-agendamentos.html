<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/image/LOGO JHON BARBEARIA 2.png}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Agendamentos | Jhon Barbearia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="agendamento-bg d-flex flex-column" style="min-height: 100vh;">

<div th:replace="~{fragments :: navbar}"></div>

<main class="flex-grow-1 container py-5 mt-4">
    <h2 class="section-title text-center">Meus Agendamentos</h2>

    <p th:if="${erro != null}" th:text="${erro}" class="alert alert-danger text-center fw-bold"></p>
    <p th:if="${sucesso != null}" th:text="${sucesso}" class="alert alert-success text-center fw-bold"></p>

    <div class="card shadow p-4" style="border-radius: 12px; position: relative; z-index: 1;">
        <div th:if="${#lists.isEmpty(meusAgendamentos)}" class="text-center py-4">
            <h5 class="text-muted">Você ainda não possui nenhum agendamento.</h5>
            <a href="/#home" class="btn btn-warning mt-3 fw-bold">Agendar agora</a>
        </div>

        <div th:if="${!#lists.isEmpty(meusAgendamentos)}" class="table-responsive">
            <table class="table table-hover align-middle text-center">
                <thead class="table-dark">
                <tr>
                    <th>Data</th>
                    <th>Hora</th>
                    <th>Barbeiro</th>
                    <th>Serviços</th>
                    <th>Valor Total</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="agendamento : ${meusAgendamentos}">
                    <td class="fw-bold text-secondary" th:text="${#temporals.format(agendamento.dataHora, 'dd/MM/yyyy')}"></td>
                    <td class="fw-bold" th:text="${#temporals.format(agendamento.dataHora, 'HH:mm')}"></td>
                    <td th:text="${agendamento.barbeiro.nome}"></td>
                    <td>
                        <span th:each="servico : ${agendamento.servicos}" class="badge bg-light text-dark border me-1" th:text="${servico.nome}"></span>
                    </td>
                    <td class="fw-bold text-success" th:text="'R$ ' + ${#numbers.formatDecimal(agendamento.valorTotal, 1, 'POINT', 2, 'COMMA')}"></td>
                    <td>
                        <span class="badge bg-success" th:if="${agendamento.status == 'Agendado'}">Confirmado</span>
                        <span class="badge bg-danger" th:if="${agendamento.status == 'Cancelado'}">Cancelado</span>
                    </td>
                    <td>
                        <form th:if="${agendamento.status == 'Agendado'}" th:action="@{/meus-agendamentos/cancelar}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="agendamentoId" th:value="${agendamento.id}">
                            <button class="btn btn-sm btn-outline-danger fw-bold" type="submit">Cancelar</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
