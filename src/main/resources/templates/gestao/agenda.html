<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <link rel="icon" type="image/png" th:href="@{/image/LOGO JHON BARBEARIA 2.png}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda do Dia | Jhon Barbearia</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-bg sidebar-layout">

<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{admin/fragments :: sidebar}"></div>

<main class="sidebar-content">
  <div class="page-header">
    <div>
      <h1>Agenda do Dia</h1>
      <p>Lista operacional para acompanhamento dos atendimentos.</p>
    </div>
    <div class="d-flex gap-2">
      <a th:if="${session.usuarioLogado.admin}" href="/admin" class="btn btn-outline-dark btn-sm">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;vertical-align:-2px;"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
    </div>
  </div>

  <div class="dashboard-card mb-4">
    <div class="dashboard-card-body">
      <form th:action="@{/gestao/agenda}" method="get" class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label mb-1">Data</label>
          <input type="date" name="data" class="form-control" th:value="${dataSelecionada}">
        </div>
        <div class="col-md-2">
          <button class="btn btn-dark w-100 fw-bold" type="submit">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;vertical-align:-2px;"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            Filtrar
          </button>
        </div>
        <div class="col-md-2">
          <a href="/gestao/agenda" class="btn btn-outline-dark w-100 fw-bold">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;vertical-align:-2px;"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            Hoje
          </a>
        </div>
      </form>
    </div>
  </div>

  <div class="dashboard-card">
    <div class="dashboard-card-header">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px;vertical-align:-3px;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Atendimentos de <span th:text="${#temporals.format(dataSelecionada, 'dd/MM/yyyy')}"></span>
      </h3>
      <span class="badge bg-dark" th:text="${#lists.size(agendamentos)} + ' atendimento(s)'"></span>
    </div>
    <div class="dashboard-card-body p-0">
      <div th:if="${#lists.isEmpty(agendamentos)}" class="text-center text-muted py-5">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:8px;opacity:0.4;"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <p class="mb-0">Nenhum atendimento encontrado para esta data.</p>
      </div>
      <div th:if="${!#lists.isEmpty(agendamentos)}" class="table-responsive">
        <table class="table align-middle mb-0">
          <thead>
            <tr>
              <th>Hora</th>
              <th>Cliente</th>
              <th>Telefone</th>
              <th>Barbeiro</th>
              <th>Serviços</th>
              <th>Valor</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="agendamento : ${agendamentos}">
              <td class="fw-bold fs-6" th:text="${#temporals.format(agendamento.dataHora, 'HH:mm')}"></td>
              <td>
                <div class="d-flex align-items-center gap-2">
                  <span class="sidebar-user-avatar" style="width:28px;height:28px;font-size:0.7rem;" th:text="${#strings.arraySplit(agendamento.cliente.nome, ' ')[0].charAt(0)}">C</span>
                  <span th:text="${agendamento.cliente.nome}">Cliente</span>
                </div>
              </td>
              <td th:text="${agendamento.cliente.telefone}"></td>
              <td th:text="${agendamento.barbeiro.nome}"></td>
              <td>
                <span th:each="servico : ${agendamento.servicos}" class="badge bg-light text-dark border me-1" th:text="${servico.nome}"></span>
              </td>
              <td class="fw-bold" th:text="'R$ ' + ${#numbers.formatDecimal(agendamento.valorTotal, 1, 'POINT', 2, 'COMMA')}"></td>
              <td>
                <span class="badge bg-success" th:if="${agendamento.status == 'Agendado'}">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-right:2px;vertical-align:-1px;"><polyline points="20 6 9 17 4 12"/></svg>
                  Confirmado
                </span>
                <span class="badge bg-danger" th:if="${agendamento.status == 'Cancelado'}">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="margin-right:2px;vertical-align:-1px;"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                  Cancelado
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
