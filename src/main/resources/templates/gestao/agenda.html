<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/image/LOGO JHON BARBEARIA 2.png}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda do Dia | Jhon Barbearia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-bg d-flex flex-column" style="min-height: 100vh;">

<div th:replace="~{fragments :: navbar}"></div>

<main class="container py-5 mt-4">
    <div class="admin-shell mx-auto">
        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
            <div>
                <h1 class="display-heading fw-bold mb-1">Agenda do Dia</h1>
                <p class="text-muted mb-0">Lista operacional para o barbeiro e para o dono acompanharem os atendimentos.</p>
            </div>
            <a th:if="${session.usuarioLogado.admin}" href="/admin" class="btn btn-warning fw-bold">Dashboard</a>
        </div>

        <form th:action="@{/gestao/agenda}" method="get" class="admin-panel mb-4">
            <div class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Data</label>
                    <input type="date" name="data" class="form-control" th:value="${dataSelecionada}">
                </div>
                <div class="col-md-2">
                    <button class="btn btn-dark w-100 fw-bold" type="submit">Filtrar</button>
                </div>
            </div>
        </form>

        <section class="admin-panel">
            <h2 th:text="'Atendimentos de ' + ${#temporals.format(dataSelecionada, 'dd/MM/yyyy')}">Atendimentos</h2>
            <div th:if="${#lists.isEmpty(agendamentos)}" class="text-center text-muted py-4">
                Nenhum atendimento encontrado para esta data.
            </div>
            <div th:if="${!#lists.isEmpty(agendamentos)}" class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Hora</th>
                        <th>Cliente</th>
                        <th>Telefone</th>
                        <th>Barbeiro</th>
                        <th>Serviços</th>
                        <th>Valor</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="agendamento : ${agendamentos}">
                        <td class="fw-bold" th:text="${#temporals.format(agendamento.dataHora, 'HH:mm')}"></td>
                        <td th:text="${agendamento.cliente.nome}"></td>
                        <td th:text="${agendamento.cliente.telefone}"></td>
                        <td th:text="${agendamento.barbeiro.nome}"></td>
                        <td><span th:each="servico : ${agendamento.servicos}" class="badge bg-light text-dark border me-1" th:text="${servico.nome}"></span></td>
                        <td th:text="'R$ ' + ${#numbers.formatDecimal(agendamento.valorTotal, 1, 'POINT', 2, 'COMMA')}"></td>
                        <td>
                            <span class="badge bg-success" th:if="${agendamento.status == 'Agendado'}">Confirmado</span>
                            <span class="badge bg-danger" th:if="${agendamento.status == 'Cancelado'}">Cancelado</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
