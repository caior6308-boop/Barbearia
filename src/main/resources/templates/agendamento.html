<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/image/LOGO JHON BARBEARIA 2.png}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento | Jhon Barbearia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="agendamento-bg d-flex flex-column" style="min-height: 100vh;">

<div th:replace="~{fragments :: navbar}"></div>

<main class="flex-grow-1 d-flex justify-content-center align-items-center py-5">
    <div class="card shadow p-4" style="max-width: 520px; width: 100%; border-radius: 12px;">
        <h3 class="display-heading text-center mb-4">Novo Agendamento</h3>

        <div class="text-center mb-4">
            <img th:src="@{'/' + ${barbeiro.foto}}" width="110" height="110" class="rounded-circle mb-2 shadow-sm" style="object-fit:cover; border: 3px solid #f1c40f;" alt="Barbeiro">
            <h5 class="fw-bold m-0" th:text="${barbeiro.nome}">Nome do Barbeiro</h5>
            <small class="text-muted" th:text="${barbeiro.especialidade}">Especialidade</small>
        </div>

        <div th:if="${mensagemErro != null}" class="alert alert-danger text-center fw-bold" role="alert">
            <span th:text="${mensagemErro}"></span>
        </div>

        <form th:action="@{/agendamento/salvar}" method="post" id="formAgendamento">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input type="hidden" name="barbeiroId" id="barbeiroId" th:value="${barbeiro.id}">
            <input type="hidden" name="hora" id="horaSelecionada">

            <div class="mb-4">
                <label class="form-label fw-bold">Selecione os Serviços</label>
                <div class="list-group shadow-sm">
                    <label class="list-group-item d-flex justify-content-between align-items-center" th:each="servico : ${listaServicos}" style="cursor: pointer;">
                        <div>
                            <input class="form-check-input me-2 servico-checkbox" type="checkbox" name="servicosIds"
                                   th:value="${servico.id}" th:data-preco="${servico.preco}">
                            <span class="fw-semibold" th:text="${servico.nome}"></span>
                        </div>
                        <span class="badge bg-dark rounded-pill" th:text="'R$ ' + ${#numbers.formatDecimal(servico.preco, 1, 'POINT', 2, 'COMMA')}"></span>
                    </label>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-light rounded shadow-sm border border-warning">
                <span class="fw-bold text-uppercase" style="letter-spacing: 1px;">Valor Total:</span>
                <span class="fw-bold fs-4 text-success" id="valorTotalTexto">R$ 0,00</span>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Data do atendimento</label>
                <input type="date" name="data" id="dataAgendamento" class="form-control form-control-lg text-center fw-bold shadow-sm" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Horários disponíveis</label>
                <div id="horariosDisponiveis" class="horarios-grid">
                    <span class="text-muted small">Escolha uma data para carregar os horários.</span>
                </div>
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold mt-2 shadow-sm" style="height: 50px;">Confirmar Serviços</button>
            <a href="/" class="btn btn-outline-dark w-100 mt-2 fw-bold">Cancelar</a>
        </form>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const checkboxes = document.querySelectorAll('.servico-checkbox');
        const valorTotalTexto = document.getElementById('valorTotalTexto');
        const form = document.getElementById('formAgendamento');
        const dataInput = document.getElementById('dataAgendamento');
        const barbeiroId = document.getElementById('barbeiroId').value;
        const horariosDiv = document.getElementById('horariosDisponiveis');
        const horaSelecionada = document.getElementById('horaSelecionada');

        function calcularTotal() {
            let total = 0;
            let marcados = 0;
            checkboxes.forEach(box => {
                if (box.checked) {
                    total += parseFloat(box.getAttribute('data-preco'));
                    marcados++;
                }
            });

            valorTotalTexto.innerText = 'R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            return marcados;
        }

        function selecionarHorario(botao, horario) {
            document.querySelectorAll('.horario-btn').forEach(btn => btn.classList.remove('active'));
            botao.classList.add('active');
            horaSelecionada.value = horario;
        }

        async function carregarHorarios() {
            horaSelecionada.value = '';
            horariosDiv.innerHTML = '<span class="text-muted small">Carregando horários...</span>';

            const resposta = await fetch(`/api/agendamentos/horarios-disponiveis?barbeiroId=${barbeiroId}&data=${dataInput.value}`);
            const horarios = await resposta.json();
            horariosDiv.innerHTML = '';

            if (horarios.length === 0) {
                horariosDiv.innerHTML = '<span class="text-danger small fw-bold">Nenhum horário disponível para esta data.</span>';
                return;
            }

            horarios.forEach(horario => {
                const botao = document.createElement('button');
                botao.type = 'button';
                botao.className = 'btn btn-outline-dark horario-btn';
                botao.textContent = horario;
                botao.addEventListener('click', () => selecionarHorario(botao, horario));
                horariosDiv.appendChild(botao);
            });
        }

        checkboxes.forEach(box => box.addEventListener('change', calcularTotal));
        dataInput.addEventListener('change', carregarHorarios);

        // Validacao final do front; a regra principal continua no Java.
        form.addEventListener('submit', function(e) {
            if (calcularTotal() === 0) {
                e.preventDefault();
                alert('Por favor, selecione pelo menos um serviço antes de confirmar.');
                return;
            }
            if (!horaSelecionada.value) {
                e.preventDefault();
                alert('Escolha um horário disponível antes de confirmar.');
            }
        });
    });
</script>
</body>
</html>
