<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/image/LOGO JHON BARBEARIA 2.png}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil | Jhon Barbearia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="agendamento-bg d-flex flex-column" style="min-height: 100vh;">

<div th:replace="~{fragments :: navbar}"></div>

<main class="flex-grow-1 container py-5 mt-4 d-flex justify-content-center">
    <div class="card shadow p-4" style="max-width: 600px; width: 100%; border-radius: 12px; position: relative; z-index: 1;">
        <h2 class="display-heading text-center mb-4">Meu Perfil</h2>

        <p th:if="${erro != null}" th:text="${erro}" class="alert alert-danger text-center fw-bold"></p>
        <p th:if="${sucesso != null}" th:text="${sucesso}" class="alert alert-success text-center fw-bold"></p>

        <div class="text-center mb-4">
            <img src="/image/LOGO JHON BARBEARIA 2.png" width="100" height="100" class="rounded-circle shadow-sm border border-warning bg-light" style="object-fit:cover;" alt="Perfil">
            <h5 class="fw-bold mt-2 mb-0" th:text="${cliente.nome}">Nome do Cliente</h5>
        </div>

        <form th:action="@{/perfil/atualizar}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

            <h5 class="fw-bold border-bottom pb-2 mb-3">Dados Pessoais</h5>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">Nome Completo</label>
                <input type="text" name="nome" class="form-control fw-bold" th:value="${cliente.nome}" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small fw-bold">E-mail</label>
                <input type="email" name="email" class="form-control fw-bold" th:value="${cliente.email}" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Telefone</label>
                <input type="text" name="telefone" class="form-control fw-bold" th:value="${cliente.telefone}">
            </div>

            <h5 class="fw-bold border-bottom pb-2 mb-3">Segurança</h5>
            <div class="mb-4">
                <label class="form-label text-muted small fw-bold">Nova Senha</label>
                <input type="password" name="novaSenha" class="form-control" placeholder="Deixe em branco para manter a senha atual" minlength="6">
            </div>

            <button type="submit" class="btn btn-warning w-100 fw-bold py-2 shadow-sm">Salvar Alterações</button>
        </form>
    </div>
</main>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
