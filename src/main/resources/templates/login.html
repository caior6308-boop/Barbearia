<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/image/LOGO JHON BARBEARIA 2.png}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso | Barbearia Jhon do Corte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body id="pagina-login" class="login-bg d-flex flex-column" style="min-height: 100vh;" th:data-abrir-cadastro="${abrirAbaCadastro != null}">

<div th:replace="~{fragments :: navbar}"></div>

<div class="flex-grow-1 d-flex justify-content-center align-items-center py-5">
    <div class="login-card shadow">
        <img src="/image/LOGO JHON BARBEARIA 2.png" class="logo-login" alt="Logo">

        <p th:if="${erro != null}" th:text="${erro}" class="text-danger text-center fw-bold"></p>
        <p th:if="${sucesso != null}" th:text="${sucesso}" class="text-success text-center fw-bold"></p>

        <div id="section-login" class="form-section active">
            <h3 class="text-center fw-bold mb-3">Entrar</h3>
            <form th:action="@{/login}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" placeholder="Digite seu e-mail" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Senha</label>
                    <input type="password" name="senha" class="form-control" placeholder="Digite sua senha" required>
                </div>
                <div class="text-end mb-2">
                    <a href="#" onclick="alternarTelas('recuperar')" class="text-muted text-decoration-none"><small>Esqueceu a senha?</small></a>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold mt-2">Entrar</button>
                <p class="text-center mt-3">Não tem conta? <a href="#" onclick="alternarTelas('cadastro')">Cadastre-se</a></p>
            </form>
        </div>

        <div id="section-recuperar" class="form-section">
            <h3 class="text-center fw-bold mb-3">Recuperar Senha</h3>
            <p class="text-center text-muted small">Digite seu e-mail cadastrado. Enviaremos uma senha temporária para você redefinir seu acesso.</p>
            <form th:action="@{/recuperar-senha}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" placeholder="exemplo@email.com" required>
                </div>
                <button type="submit" class="btn btn-warning w-100 fw-bold mt-2">Enviar Nova Senha</button>
                <p class="text-center mt-3">Lembrou a senha? <a href="#" onclick="alternarTelas('login')">Voltar</a></p>
            </form>
        </div>

        <div id="section-cadastro" class="form-section">
            <h3 class="text-center fw-bold mb-3">Criar Conta</h3>
            <form th:action="@{/cadastro}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <div class="mb-3">
                    <label class="form-label">Nome Completo</label>
                    <input type="text" name="nome" class="form-control" placeholder="Digite seu nome" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">E-mail</label>
                    <input type="email" name="email" class="form-control" placeholder="Digite seu e-mail" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="text" name="telefone" class="form-control" placeholder="(00) 00000-0000">
                </div>
                <div class="mb-3">
                    <label class="form-label">Crie uma Senha</label>
                    <input type="password" name="senha" class="form-control" placeholder="Mínimo 6 caracteres" required minlength="6">
                </div>
                <button type="submit" class="btn btn-dark w-100 fw-bold mt-2">Cadastrar</button>
                <p class="text-center mt-3">Já possui conta? <a href="#" onclick="alternarTelas('login')">Faça Login</a></p>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
