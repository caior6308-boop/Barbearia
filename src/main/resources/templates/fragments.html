<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
            <img th:src="@{/image/LOGO JHON BARBEARIA 2.png}" alt="logo">
            Jhon Barbearia
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu" aria-label="Abrir menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="/#home">Início</a></li>
                <li class="nav-item"><a class="nav-link" href="/#servicos">Serviços</a></li>
                <li class="nav-item"><a class="nav-link" href="/#horarios">Horários</a></li>
                <li class="nav-item"><a class="nav-link" href="/#galeria">Cortes</a></li>
                <li class="nav-item"><a class="nav-link" href="/#sobre">Sobre</a></li>
                <li class="nav-item"><a class="nav-link" href="/#endereco">Endereço</a></li>
            </ul>

            <div class="d-flex align-items-center gap-2">
                <th:block th:if="${session.usuarioLogado == null}">
                    <a href="/login" class="btn btn-outline-warning fw-bold">Entrar</a>
                    <a href="/cadastro" class="btn btn-warning fw-bold">Cadastrar</a>
                </th:block>

                <th:block th:if="${session.usuarioLogado != null}">
                    <a th:if="${session.usuarioLogado.equipe}" href="/gestao/agenda" class="btn btn-outline-warning fw-bold">Gestão administrativa</a>
                    <span class="text-white fw-bold" th:text="'Olá, ' + ${#strings.arraySplit(session.usuarioLogado.nome, ' ')[0]} + '!'"></span>
                    <div class="dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userMenu" data-bs-toggle="dropdown">
                            <img th:src="@{/image/LOGO JHON BARBEARIA 2.png}" alt="Perfil" width="40" height="40" class="rounded-circle border border-warning bg-light" style="object-fit: cover;">
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/perfil">Perfil</a></li>
                            <li><a class="dropdown-item" href="/meus-agendamentos">Meus Agendamentos</a></li>
                            <li th:if="${session.usuarioLogado.equipe}"><a class="dropdown-item" href="/gestao/agenda">Agenda do Dia</a></li>
                            <li th:if="${session.usuarioLogado.admin}"><a class="dropdown-item" href="/admin">Dashboard Administrativo</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/sair}" method="post" class="px-3">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="dropdown-item text-danger fw-bold p-0">Sair</button>
                                </form>
                            </li>
                        </ul>
                    </div>
                </th:block>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="text-center p-3 bg-dark text-light mt-auto">
    © 2026 Barbearia Jhon
</footer>

</body>
</html>
