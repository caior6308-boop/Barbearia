<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="sidebar" class="sidebar" id="adminSidebar">
  <div class="sidebar-brand">
    <a href="/admin" class="navbar-brand fw-bold d-flex align-items-center text-white text-decoration-none" style="font-family:var(--font-display);font-size:1.1rem;">
      <span style="width:32px;height:32px;border-radius:50%;background:var(--gold);color:#0f0f1a;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.875rem;margin-right:10px;flex-shrink:0;">JB</span>
      Jhon Barbearia
    </a>
    <small>Painel Administrativo</small>
  </div>

  <nav class="sidebar-nav">
    <a class="sidebar-item" th:classappend="${section == 'dashboard' ? 'active' : ''}" href="/admin">
      <span class="sidebar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </span>
      Dashboard
    </a>
    <a class="sidebar-item" th:classappend="${section == 'agenda' ? 'active' : ''}" href="/gestao/agenda">
      <span class="sidebar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </span>
      Agenda
    </a>
    <a class="sidebar-item" th:classappend="${section == 'barbeiros' ? 'active' : ''}" href="/admin#barbeiros">
      <span class="sidebar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </span>
      Barbeiros
    </a>
    <a class="sidebar-item" th:classappend="${section == 'servicos' ? 'active' : ''}" href="/admin#servicos">
      <span class="sidebar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="6" cy="6" r="3"/><circle cx="18" cy="18" r="3"/><line x1="8.5" y1="8.5" x2="15.5" y2="15.5"/><line x1="15.5" y1="8.5" x2="8.5" y2="15.5"/></svg>
      </span>
      Serviços
    </a>
    <a class="sidebar-item" th:classappend="${section == 'clientes' ? 'active' : ''}" href="/admin#clientes">
      <span class="sidebar-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </span>
      Usuários
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-user-avatar" th:text="${#strings.arraySplit(session.usuarioLogado.nome, ' ')[0].charAt(0)}">U</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name" th:text="${session.usuarioLogado.nome}">Usuário</div>
        <div class="sidebar-user-role" th:text="${session.usuarioLogado.papel}">Admin</div>
      </div>
    </div>
    <form th:action="@{/sair}" method="post" class="mt-2">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="sidebar-item w-100" style="border:none;background:none;cursor:pointer;color:var(--danger);">
        <span class="sidebar-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </span>
        Sair
      </button>
    </form>
  </div>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="fecharSidebar()"></div>
<button class="sidebar-toggle" id="sidebarToggle" onclick="abrirSidebar()" aria-label="Abrir menu">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<script>
  function abrirSidebar() {
    document.getElementById('adminSidebar').classList.add('open');
  }
  function fecharSidebar() {
    document.getElementById('adminSidebar').classList.remove('open');
  }
</script>

</body>
</html>
